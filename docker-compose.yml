# Local development database.
#
#   docker compose up -d      # start Postgres in the background
#   docker compose down       # stop it (data is kept in the named volume)
#   docker compose down -v    # stop and wipe all data
#
# Credentials here are for local dev only and match server/.env.example.
services:
  db:
    image: postgres:17-alpine
    container_name: booking-tool-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_tool
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d booking_tool']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
